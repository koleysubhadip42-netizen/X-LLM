<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>x-LLM - Advanced AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .logo-font { font-family: 'Space Grotesk', sans-serif; }
    #chatContainer::-webkit-scrollbar { width: 4px; }
    #chatContainer::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    .message-bubble img { max-width: 250px; border-radius: 12px; margin-bottom: 10px; }
    .loader { border: 2px solid #f3f3f3; border-top: 2px solid #7c3aed; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-200">

<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar" class="fixed md:static z-40 w-72 h-full bg-white dark:bg-zinc-900 border-r dark:border-zinc-800 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300">
    <div class="p-6 border-b dark:border-zinc-800 flex items-center gap-3">
      <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-bold text-white">X</div>
      <span class="font-bold text-2xl logo-font tracking-tighter">x-LLM</span>
    </div>
    <button onclick="newChat()" class="m-4 bg-violet-600 text-white py-3 rounded-xl font-semibold hover:bg-violet-700 transition">+ New Chat</button>
    <div id="chatList" class="flex-1 overflow-y-auto px-4 space-y-2"></div>
    <div class="p-4 border-t dark:border-zinc-800">
      <button onclick="showSettings()" class="w-full text-left px-4 py-2 hover:bg-zinc-800 rounded-lg flex items-center gap-3"><i class="fa-solid fa-gear"></i> Settings</button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col w-full relative">
    <header class="h-16 flex items-center justify-between px-6 border-b dark:border-zinc-800 bg-white dark:bg-zinc-900">
      <button onclick="toggleSidebar()" class="md:hidden text-xl"><i class="fa-solid fa-bars"></i></button>
      <div class="logo-font font-bold text-xl text-violet-600">x-LLM</div>
      <div class="w-6"></div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-40"></main>

    <div class="absolute bottom-0 left-0 right-0 p-4 bg-zinc-50 dark:bg-zinc-950">
      <div class="max-w-4xl mx-auto">
        <div id="attachmentPreview" class="hidden mb-3 p-2 bg-violet-50 dark:bg-violet-900/20 rounded-xl flex items-center gap-3 border border-violet-200">
            <div id="previewThumb" class="w-10 h-10 rounded overflow-hidden"></div>
            <span class="text-xs flex-1 truncate" id="fileName"></span>
            <button onclick="removeFile()" class="text-red-500 px-2">&times;</button>
        </div>
        
        <div class="flex gap-2 items-end bg-white dark:bg-zinc-900 p-2 rounded-2xl border dark:border-zinc-800 shadow-xl">
          <button onclick="document.getElementById('fileInput').click()" class="p-3 text-zinc-400 hover:text-violet-500"><i class="fa-solid fa-plus"></i></button>
          <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFile(this.files[0])">
          <textarea id="messageInput" class="flex-1 bg-transparent border-none p-3 outline-none resize-none max-h-32" rows="1" placeholder="Type or ask..."></textarea>
          <button id="sendBtn" onclick="sendMessage()" class="bg-violet-600 text-white p-3 rounded-xl hover:bg-violet-700 transition"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="settingsModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[100] p-4">
  <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl w-full max-w-md border dark:border-zinc-800">
    <h2 class="text-2xl font-bold mb-6">Settings</h2>
    <input id="apiKeyInput" type="password" placeholder="OpenRouter API Key" class="w-full bg-zinc-100 dark:bg-zinc-800 p-3 rounded-xl mb-4 outline-none">
    <input id="modelInput" type="text" value="google/gemini-2.0-flash-lite:preview:free" class="w-full bg-zinc-100 dark:bg-zinc-800 p-3 rounded-xl mb-6 outline-none">
    <button onclick="saveSettings()" class="w-full py-3 bg-violet-600 text-white font-bold rounded-xl">Save</button>
    <button onclick="hideSettings()" class="w-full mt-2 text-zinc-500">Cancel</button>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("xllm_chats") || "[]");
let currentId = localStorage.getItem("xllm_curr") || null;
let apiKey = localStorage.getItem("xllm_key") || "";
let model = localStorage.getItem("xllm_model") || "google/gemini-2.0-flash-lite:preview:free";
let selectedFile = null;

function saveSettings() {
    apiKey = document.getElementById('apiKeyInput').value;
    model = document.getElementById('modelInput').value;
    localStorage.setItem('xllm_key', apiKey);
    localStorage.setItem('xllm_model', model);
    hideSettings();
}

function handleFile(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        selectedFile = e.target.result;
        document.getElementById('attachmentPreview').classList.remove('hidden');
        document.getElementById('previewThumb').innerHTML = `<img src="${selectedFile}" class="w-full h-full object-cover">`;
        document.getElementById('fileName').innerText = file.name;
    };
    reader.readAsDataURL(file);
}

function removeFile() {
    selectedFile = null;
    document.getElementById('attachmentPreview').classList.add('hidden');
}

function speakText(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.speak(msg);
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("Copied to clipboard!");
}

function renderMessages() {
    const container = document.getElementById('chatContainer');
    container.innerHTML = "";
    const chat = chats.find(c => c.id === currentId);
    if (!chat) return;

    chat.messages.forEach((msg, idx) => {
        const div = document.createElement('div');
        div.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} group`;
        
        const bubble = document.createElement('div');
        bubble.className = `${msg.role === 'user' ? 'bg-violet-600 text-white' : 'bg-white dark:bg-zinc-900 border dark:border-zinc-800'} p-4 rounded-2xl max-w-[85%] relative message-bubble`;
        
        let content = msg.image ? `<img src="${msg.image}">` : "";
        content += `<div>${marked.parse(msg.content)}</div>`;
        
        // Action Buttons
        const actions = `
            <div class="flex gap-3 mt-3 opacity-0 group-hover:opacity-100 transition text-xs border-t pt-2 border-zinc-500/30">
                <button onclick="speakText(\`${msg.content.replace(/`/g, "'")}\`)"><i class="fa-solid fa-volume-high"></i></button>
                <button onclick="copyText(\`${msg.content.replace(/`/g, "'")}\`)"><i class="fa-solid fa-copy"></i></button>
                <button onclick="deleteMsg(${idx})"><i class="fa-solid fa-trash"></i></button>
            </div>`;
        
        bubble.innerHTML = content + actions;
        div.appendChild(bubble);
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if(!text && !selectedFile) return;
    if(!apiKey) return showSettings();

    const chat = chats.find(c => c.id === currentId);
    const userMsg = { role: "user", content: text || "Analyze this image", image: selectedFile };
    chat.messages.push(userMsg);
    
    // Speak prompt
    if(text) speakText(text);

    let apiContent = [{ type: "text", text: text || "What is in this image?" }];
    if(selectedFile) apiContent.push({ type: "image_url", image_url: { url: selectedFile } });

    const payload = chat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
    payload.push({ role: "user", content: apiContent });

    input.value = ""; 
    removeFile();
    renderMessages();

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: model, messages: payload })
        });
        const data = await res.json();
        const aiReply = data.choices[0].message.content;
        
        chat.messages.push({ role: "assistant", content: aiReply });
        renderMessages();
        speakText(aiReply);
        saveState();
    } catch(e) {
        alert("API Connection Error! Please check your Key.");
    }
}

function deleteMsg(idx) {
    const chat = chats.find(c => c.id === currentId);
    chat.messages.splice(idx, 1);
    saveState();
    renderMessages();
}

function newChat() {
    const id = Date.now().toString();
    chats.unshift({ id, title: "New Chat", messages: [] });
    currentId = id;
    saveState();
    renderChats();
    renderMessages();
}

function renderChats() {
    const list = document.getElementById('chatList');
    list.innerHTML = "";
    chats.forEach(c => {
        const div = document.createElement('div');
        div.className = `p-3 rounded-xl cursor-pointer ${c.id === currentId ? 'bg-violet-600/10 text-violet-600' : 'hover:bg-zinc-800'}`;
        div.innerHTML = `<div class="flex justify-between items-center"><span class="truncate">${c.title}</span><i class="fa-solid fa-xmark text-xs" onclick="deleteChat('${c.id}')"></i></div>`;
        div.onclick = () => { currentId = c.id; renderMessages(); renderChats(); };
        list.appendChild(div);
    });
}

function deleteChat(id) { chats = chats.filter(c => c.id !== id); saveState(); renderChats(); }
function saveState() { localStorage.setItem("xllm_chats", JSON.stringify(chats)); localStorage.setItem("xllm_curr", currentId); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
function hideSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

if(!currentId) newChat();
renderChats();
renderMessages();
</script>
</body>
</html>
